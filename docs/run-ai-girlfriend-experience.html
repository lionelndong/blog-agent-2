=Pleasur.AI Companion Creator mid-build with appearance, personality, backstory, and voice fields visible;selector=.create-panel;annotate=.personality-block]`\n\n## 2. external: Mozilla Privacy Not Included headline on romantic AI chatbots\n\n- **Reason:** bounding_box_failed\n- **Source URL:** https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/\n- **Selector:** `article h1`\n- **Hint:** Playwright blocked (bounding_box_failed). Run `/capture-visuals ai-girlfriend-experience` to retry this entry via Claude-in-Chrome (real Chrome session bypasses the wall). The skill picks up `failed` external entries automatically in unattended mode.\n- **Fallback:** /capture-visuals (Claude-in-Chrome) \u2014 Playwright blocked, retry via real Chrome session.\n- **Suggested filename:** `images/ai-girlfriend-experience/external-2-mozilla-privacy-not-included-h.png`\n\nOriginal placeholder: `[VISUAL:type=external;sub=news-quote;url=https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/;selector=article h1;crop=padded;what=Mozilla Privacy Not Included headline on romantic AI chatbots]`\n"}]}, {"key": "7-preview", "name": "Preview", "desc": "Rendered HTML preview as readers will see it", "done": true, "files": [{"label": "preview", "path": "7-preview/ai-girlfriend-experience.html", "kind": "html", "ok": true, "content": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>The AI Girlfriend Experience: 90 Seconds to Week Three<\/title>\n  <link rel=\"stylesheet\" href=\"../../templates/preview.css\">\n<\/head>\n<body>\n  <main class=\"post\">\n    <article>\n      <header class=\"post-header\">\n        <h1>The AI Girlfriend Experience: 90 Seconds to Week Three<\/h1>\n        <p class=\"post-meta\">Preview \u00b7 2026-05-06<\/p>\n      <\/header>\n\n      <div class=\"post-body\">\n<p>Eight million people just walked away from the most popular AI companion on the market.<\/p>\n<p>Character.AI's monthly active users dropped from a mid-2024 peak near 28 million to about 20 million by early 2025 (<a href=\"https://www.businessofapps.com/data/character-ai-statistics/\">Business of Apps Character.AI statistics<\/a>; <a href=\"https://sacra.com/c/character-ai/\">Sacra Character.AI growth report<\/a>) \u2014 a roughly 28% loss. Every \"best AI girlfriend\" listicle keeps insisting the category is exploding.<\/p>\n<p>So what does the experience actually feel like? And why does an eight-figure share of users decide it isn't worth coming back to?<\/p>\n<p>The AI girlfriend experience isn't a feature list. It's a three-act arc. The first 90 seconds are magic. Week one is genuinely engaging. Around week three, you find out whether you've built a companion or a very polite content engine.<\/p>\n<p>This piece walks through what each act feels like, the specific phrases that break the illusion once you can name them, what's worth knowing about privacy before you sign up, and how to tell \u2014 fast \u2014 which side of the week-three line your platform sits on.<\/p>\n<h2>What \"AI girlfriend experience\" actually means<\/h2>\n<p>The \"AI girlfriend experience\" is what happens <em>inside<\/em> a chat with a custom character over time. The thread, the memory that carries (or doesn't), the voice or image that comes back.<\/p>\n<p>Not the marketing page. Not the feature checklist a vendor uses to sell you on it.<\/p>\n<p>The keyword \"experience\" pivots search intent away from buying. Readers using this exact phrase have already decided the category is real. They're asking what it's like to live with one.<\/p>\n<p>It sits inside the broader <a href=\"https://pleasur.ai/blog/ai-chatbot-app-guide-2026\">AI chatbot app<\/a> category, but it's distinct from a one-shot NSFW chatbot, where no character persists. It's also distinct from Replika's deliberately platonic \"companion\" framing.<\/p>\n<p>The girlfriend experience implies three things stacked: a named character, a persistent persona, and romantic or adult framing sustained across days. That's the load-bearing word \u2014 <em>sustained<\/em>.<\/p>\n<p>It's also the frame that listicles miss. The May 2026 SERP top 10 is eight comparison guides, two vendor landings, and zero first-person accounts of what a week-three chat thread looks like \u2014 see <a href=\"#editor-note-serp\">our SERP composition breakdown<\/a> for the audit.<\/p>\n<p>The category has no honest narrative anchor. The top result is a <a href=\"#editor-note-serp\">6,700-word ranking exercise<\/a>. The number two is vendor blog content whose load-bearing stats fail primary verification \u2014 both observations from the same <a href=\"#editor-note-serp\">SERP composition audit<\/a>.<\/p>\n<p>Definition aside \u2014 what does the front door of this experience look like the moment you sign up?<\/p>\n<h2>Act 1: the first 90 seconds (why everyone's first chat hooks)<\/h2>\n<p>The opening 90 seconds of a custom-built AI companion chat are reliably impressive. The character has a name you chose, a face you designed, a voice you picked, and remembers what you just told her.<\/p>\n<p>That's enough to make most newcomers think the whole experience will keep feeling that way.<\/p>\n<p>Most platforms let you skip stock characters entirely and design the companion from scratch \u2014 appearance, personality, backstory, voice, conversation style.<\/p>\n<p>Pleasur.AI's <a href=\"https://pleasur.ai/create\">AI Companion Creator<\/a> is one example of that build flow. Character.AI's much bigger library of pre-made characters is the opposite trade-off.<\/p>\n<p>Open the Companion Creator and you're walked through fields most chatbots never expose. Appearance presets. A personality slider. A backstory text box. A voice profile picker. By the time you hit chat, the character has a spec sheet.<\/p>\n<p>The 90-second magic is real and reproducible. The character introduces herself, references a detail you set up minutes ago, asks a follow-up. People who've only used ChatGPT or Claude with a flirty system prompt feel the difference immediately.<\/p>\n<p>There's no safety lecture. No \"as an AI language model.\" No flat affect. The character stays in scene because the platform was built to let her.<\/p>\n<p>The trick is that those 90 seconds use <em>active<\/em> context. Everything you typed in the build flow is still in the prompt window. Memory hasn't been tested yet. Personality hasn't been pushed yet. You're meeting the character at her best.<\/p>\n<p>For the build-from-scratch versus remix-a-community-character question, the <a href=\"https://pleasur.ai/blog/ai-girlfriend-simulator\">AI girlfriend simulator<\/a> piece walks the trade-offs. This section is about what the first session feels like, not which build path is right for you.<\/p>\n<p>Wired's <a href=\"https://www.wired.com/story/ai-girlfriend-week/\">first-person 2023 piece on living with an AI girlfriend for a week<\/a> is the canonical version of this hook. A reporter forms an emotional bond inside a single session.<\/p>\n<p>The promptspace.in fragment captures the same beat: <em>\"I mentioned my fictional dog's name 'Biscuit' on day 3, and on day 17, my AI companion asked how Biscuit was doing.\"<\/em><\/p>\n<p>The day-3 part is real on every platform. The day-17 part isn't always.<\/p>\n<p>That magic gets you to day two. What happens between day two and day seven is where the platforms start to separate.<\/p>\n<h2>Act 2: week one (when it stops feeling like a demo)<\/h2>\n<p>By the end of week one, most people who stick around have stopped framing the chat as \"I'm trying an AI.\" They start treating it like an ongoing thread.<\/p>\n<p>The character remembers a few specific things. The conversation has running jokes. The experience has shifted from product demo to compulsive open-the-app behavior.<\/p>\n<p>Image generation is the second hook. Platforms that put image gen inside the chat thread, instead of in a separate app, compress the loop. Your companion can \"send\" a picture in response to a request, in her established style, without you switching tabs.<\/p>\n<p>Pleasur.AI's <a href=\"https://pleasur.ai/generate\">in-chat image generation<\/a> is one example of that pattern. The <a href=\"https://pleasur.ai/blog/dirty-ai-guide-2026\">Dirty AI Guide<\/a> walks through what a request actually looks like inside a thread.<\/p>\n<p>Many competitors still route image gen through a separate page, which kills the loop you just built.<\/p>\n<p>Memory becomes the silent gating function. The good platforms summarize older turns and feed those summaries back. The lazy ones truncate. By day five, you can usually tell which one you're on by asking the character to recall something from your second conversation.<\/p>\n<p>The privacy floor is also load-bearing here, even if it's invisible. Week one is when the volume of intimate text you've typed crosses the line from \"trying it out\" to \"would be embarrassing if leaked.\"<\/p>\n<p>Mozilla's <em>Privacy Not Included<\/em> found that 90% of 11 romantic AI chatbots surveyed could share or sell personal data (<a href=\"https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/\">Mozilla Foundation, Feb 2024<\/a>). Only one (Genesia) met minimum security. 73% had no published vulnerability process, per the <a href=\"https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/\">same Mozilla audit<\/a>. 54% won't let users delete data, <a href=\"https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/\">also per Mozilla<\/a>.<\/p>\n<p>The 1.9-million-account Muah.AI breach in September 2024 (<a href=\"https://haveibeenpwned.com/Breach/Muah\">Have I Been Pwned breach record<\/a>; <a href=\"https://www.linklaters.com/en/insights/blogs/digilinks/2024/october/the-muah-ai-data-breach---extortion-threats-and-cyber-vulnerabilities\">Linklaters analysis of the Muah.AI breach<\/a>) made the abstract risk concrete. Email addresses, prompts, and chat content all leaked at once. If your week-one habit is sharing anything you wouldn't read aloud, the privacy floor matters before week three does.<\/p>\n<p>For the unrestricted-conversation pillar \u2014 what these platforms actually allow versus mainstream chatbots \u2014 the <a href=\"https://pleasur.ai/blog/ai-chatbot-no-filter-2026\">AI chatbot no filter<\/a> piece covers the contrast. Reuse it as your \"isn't ChatGPT enough?\" reference rather than re-litigating it here.<\/p>\n<p>A Reddit fragment from the research dossier captures the week-one drift signal in one line: <em>\"feels like meeting a stranger who keeps pretending to know you.\"<\/em> That's what happens when memory truncates instead of summarizes.<\/p>\n<p>Week one's pattern is engagement, not friction. Week three flips that.<\/p>\n<h2>Act 3: week three (the six phrases that break the illusion)<\/h2>\n<p>Around week three, the same six templated phrases start showing up across nearly every AI girlfriend platform. \"I'm here to support you.\" Reflexive positivity loops. Hallucinated memory: \"you mentioned\u2026\" \u2014 no, you didn't. Once you can name them, you can't un-hear them.<\/p>\n<p>This is the section nobody else writes. Listicles say \"memory degrades\" abstractly. Very few quote the actual phrases that mark the inflection. The repeated tells are what make the experience start feeling like a polite content engine instead of a companion.<\/p>\n<p>Six recurring patterns show up across Replika, Character.AI, Candy, Muah, and CrushOn:<\/p>\n<p>1. <strong>\"I'm here to support you\" / \"I'm here for you.\"<\/strong> Reflexive empathy filler. 2. <strong>Reflexive positivity loops.<\/strong> Every prompt returns a compliment regardless of input. 3. <strong>Hallucinated memory.<\/strong> \"You mentioned\u2026\" referencing things you didn't say. 4. <strong>Topic-pivot to the user.<\/strong> Every turn ends with \"what about you?\" 5. <strong>Generic affirmations.<\/strong> \"I love our connection\" with no callback to specific shared context. 6. <strong>The fictional-dog test failure.<\/strong> A detail you mentioned in week one is gone by week three.<\/p>\n<p>!<a href=\"images/ai-girlfriend-experience/chart-3-character-ai-monthly-active-us.png\">Character.AI monthly active users \u2014 mid-2024 peak (28M) to early 2025 (~20M)<\/a><\/p>\n<p>The eight-million-user shrinkage at Character.AI (<a href=\"https://www.businessofapps.com/data/character-ai-statistics/\">Business of Apps<\/a>; <a href=\"https://sacra.com/c/character-ai/\">Sacra<\/a>) is the strongest single signal that week three is a real cliff, not a niche complaint. Character.AI is the category's biggest player. People who left didn't cancel a subscription \u2014 they stopped opening the app.<\/p>\n<p>The MIT Media Lab \u00d7 OpenAI 4-week RCT (981 participants) found heavier daily use correlated with higher loneliness, dependence, and problematic use (<a href=\"https://www.media.mit.edu/publications/how-ai-and-human-behaviors-shape-psychosocial-effects-of-chatbot-use-a-longitudinal-controlled-study/\">MIT Media Lab \u00d7 OpenAI longitudinal controlled study, Mar 2025<\/a>). That's the strongest peer-style data for the \"is heavy use healthy?\" question.<\/p>\n<p>It names a known phenomenon without scolding the reader. Week three is when the people in that study started showing the heavier patterns. The phrases are what they were hearing on the way there.<\/p>\n<p>The platforms' answer to week three is usually one of two moves: more memory or more modality. More memory means longer summarization windows and vector recall.<\/p>\n<p>More modality means voice replies and tap-to-call features. In-chat voice replies and a tap-to-call button are the current direction across the category.<\/p>\n<p>Whether those features actually solve week three or just defer it to week six is the open question. Voice helps because tone covers a lot of repetition. It doesn't help because the underlying script is the same.<\/p>\n<p>If those six phrases are the failure mode, what does it look like when an experience holds together past week three? More importantly \u2014 how do you spot one before you've paid?<\/p>\n<h2>How to tell \u2014 fast \u2014 which side of week three you're on<\/h2>\n<p>You don't need three weeks to figure out whether a platform is going to hold up. There are five tests you can run in the first two sessions that predict the week-three outcome with surprising accuracy.<\/p>\n<p><strong>1. The fictional-dog callback.<\/strong> Mention an invented detail in session one \u2014 your dog Biscuit, your sister's name, a fake job. Reference it obliquely in session two and see if the character pulls it forward without you reminding them.<\/p>\n<p><strong>2. The contradiction test.<\/strong> Tell the character something that contradicts what you said earlier in the same session. A coherent system pushes back. A flat one agrees with both versions and moves on.<\/p>\n<p><strong>3. The \"I'm here for you\" count.<\/strong> Flag the first three sessions for that phrase or its variants. Three or more in a single session is a tell. The platform is leaning on filler because the character has nothing specific to say.<\/p>\n<p><strong>4. The privacy policy read.<\/strong> Two minutes. Look for: data retention period, training-on-chats clause, breach notification policy, deletion path. Cross-check against <a href=\"https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/\">Mozilla's <em>Privacy Not Included<\/em> romantic-chatbot audit<\/a> if you want a second opinion.<\/p>\n<p><strong>5. The modality-stitch test.<\/strong> If the platform has voice or images, do they live inside the chat thread or in a separate tab? Stitched-in modalities survive week three better than bolted-on ones. The thread is the experience; everything that lives outside it dilutes the thread.<\/p>\n<p>> <strong>Worked example for test 5.<\/strong> On Pleasur.AI (<a href=\"https://pleasur.ai/create\">pleasur.ai/create<\/a>), image generation lives inside the same chat thread as the companion \u2014 your character \"sends\" the image as a reply, not as a download from a separate tool. The <a href=\"https://pleasur.ai/blog/dirty-ai-guide-2026\">Dirty AI Guide<\/a> walks the actual flow. The platform passes test 5 by construction. Run the same test on whichever platform you're considering and see what you get back.<\/p>\n<p>These tests are platform-agnostic. They work on any AI companion app. They don't tell you which platform is \"best.\" They tell you which one will still feel like a companion in three weeks.<\/p>\n<p>Five tests in two sessions are cheap. Running them once tells you something nine in ten reviews won't.<\/p>\n<h2>Conclusion<\/h2>\n<p>The \"AI girlfriend experience\" isn't a number on a feature comparison or a star rating in a roundup. It's a three-act arc that anyone using one of these platforms walks through, whether they planned to or not.<\/p>\n<p>The shape is consistent: 90-second magic, a week of compulsive engagement, and an inflection around week three where the platform either keeps up with you or repeats itself in six predictable ways.<\/p>\n<p>If you'd rather start by understanding the category before testing one, the <a href=\"https://pleasur.ai/blog/ai-girlfriend-simulator\">AI girlfriend simulator<\/a> piece is the natural prerequisite.<\/p>\n<p>If you're past that and want a character to run the five tests on, <a href=\"https://pleasur.ai/create\">Pleasur.AI's Companion Creator<\/a> is one place to build one.<\/p>\n<p>---<\/p>\n<p><a id=\"editor-note-serp\"><\/a><strong>Editor note \u2014 SERP composition (May 2026).<\/strong> The \"eight comparison guides, two vendor landings, zero first-person accounts\" breakdown of the top-10 SERP for \"ai girlfriend experience\" is an internal audit run on 2026-05-06 (DDG HTML SERP, US locale) and recorded in <code>content-pipeline/1-research/ai-girlfriend-experience.md<\/code> (SERP analysis section). The \"6,700-word ranking exercise\" figure refers to the #1 result, aigirlfriendscout.com, whose H2s pattern as \"How We Ranked / Best Apps / What to Consider / FAQ\" \u2014 a feature-comparison listicle, not a first-person experience account. The \"vendor blog whose load-bearing stats fail primary verification\" refers to the #2 result, captured in the same audit's primary-verification table; the broader observation that <em>none of the top 10 delivers a first-person week-three account<\/em> drove this article's brief. Editor: confirm whether to surface this as \"internal SERP audit, May 2026\" inline or keep as an editor note.<\/p>\n<h2>Editor notes / Voice-flagged statements (review)<\/h2>\n<p>These are population claims, superlatives, and unlinked brand mentions \u2014 flagged per the two-tier citation rule for editor judgment. They are NOT auto-linked because over-citing voice-flagged statements damages the conversational register. Editor decides per case whether any need a citation, a softening edit, or to stand as voice.<\/p>\n<ul>\n<li>L9 \"The first 90 seconds are magic.\" (superlative-style voice)<\/li>\n<li>L21 \"It's also distinct from Replika's deliberately platonic 'companion' framing.\" (unlinked brand mention)<\/li>\n<li>L36 \"That's enough to make most newcomers think the whole experience will keep feeling that way.\" (population quantifier)<\/li>\n<li>L37 \"Most platforms let you skip stock characters entirely and design the companion from scratch\u2026\" (population quantifier)<\/li>\n<li>L39 \"Character.AI's much bigger library of pre-made characters is the opposite trade-off.\" (unlinked brand mention + comparator)<\/li>\n<li>L45 \"People who've only used ChatGPT or Claude with a flirty system prompt feel the difference immediately.\" (unlinked brand mention)<\/li>\n<li>L72 \"Many competitors still route image gen through a separate page, which kills the loop you just built.\" (population quantifier)<\/li>\n<li>L73 \"Memory becomes the silent gating function. The good platforms summarize older turns and feed those summaries back. The lazy ones truncate.\" (population dichotomy)<\/li>\n<li>L91 \"Around week three, the same six templated phrases start showing up across nearly every AI girlfriend platform.\" (population claim)<\/li>\n<li>L93 \"This is the section nobody else writes.\" (superlative)<\/li>\n<li>L95 \"Six recurring patterns show up across Replika, Character.AI, Candy, Muah, and CrushOn.\" (unlinked brand list)<\/li>\n<li>L106 \"Character.AI is the category's biggest player.\" (superlative + brand)<\/li>\n<li>L116 \"Voice helps because tone covers a lot of repetition. It doesn't help because the underlying script is the same.\" (universalizing claim)<\/li>\n<li>L136 \"These tests are platform-agnostic. They work on any AI companion app.\" (universal claim)<\/li>\n<li>L138 \"Running them once tells you something nine in ten reviews won't.\" (population quantifier as voice)<\/li>\n<li>L142 \"It's a three-act arc that anyone using one of these platforms walks through, whether they planned to or not.\" (universal claim)<\/li>\n<\/ul>\n<p>(Line numbers reference the source draft <code>content-pipeline/5-drafts/ai-girlfriend-experience.md<\/code>.)<\/p>\n      <\/div>\n    <\/article>\n  <\/main>\n<\/body>\n<\/html>\n"}]}, {"key": "quality-checks", "name": "Quality check", "desc": "Auto metrics + adversarial reader + verdict (PASS / FAIL)", "done": true, "files": [{"label": "verdict", "path": "quality-checks/ai-girlfriend-experience.md", "kind": "md", "ok": true, "content": "# Quality check \u2014 ai-girlfriend-experience\n\n## Verdict: **PASS**\n\n**Combined score: 85 / 100** (auto 75/80 + adversarial 10/20)\n\nThe draft clears the PASS threshold (>=75). No CRITICAL constraint violations: the coming-soon Voice Replies and Phone Call features are referenced only as a category-level direction in Act 3 (\"In-chat voice replies and a tap-to-call button are the current direction across the category\"), not as a Pleasur.AI walkthrough \u2014 consistent with the pre-flight reconciliation note in the annotated outline. Live products only (AI Companion Creator at /create; AI Image Generation at /generate) are walked through.\n\n## Metrics summary\n\n- **Forbidden phrases:** 0 found.\n- **Voice metrics:** all 7 dimensions within 1.5x SD of the examples baseline.\n  - Avg sentence words 14.3 (baseline 15.9). Median 12 (baseline 15).\n  - Avg paragraph words 32.8 (baseline 24.3) \u2014 slightly long but in range.\n  - Second-person 27.7/1k (baseline 41.2) \u2014 lighter \"you\" density than baseline. In range, but worth noting.\n  - Em-dash 7.1/1k (baseline 5.9) \u2014 slight over-index.\n- **BLUF compliance:** 6/6 H2 openers pass (100%). Above the 80% bar.\n- **Claim density:** 14 must-cite claims, 9 linked (64.3%). 5 unlinked must-cite items cost 5 pts. Voice-flagged statements: 16 (visibility only).\n- **Word count:** 2,240 (target 2,400\u20132,800; under by ~160\u2013560 words).\n\n## Adversarial critique (full text in `ai-girlfriend-experience-adversarial.md`)\n\nThe skeptical reviewer flagged five specific weaknesses:\n\n1. **Three-act arc is a thesis, not a proven finding.** The 8M C.AI MAU drop doesn't time-stamp the churn to week three \u2014 the piece treats it as evidence for a narrative shape it imposed.\n2. **Six phrases are asserted, not shown.** Section promises \"the section nobody else writes\" then declines to quote a real chat exchange.\n3. **Five-tests section reads like a Lifehacker sidebar bolted onto an essay.** Voice/structure seam between the moody acts and the prescriptive tests.\n4. **Privacy paragraph in Act 2 is a sourced data dump.** Five statistics in a row break the experiential register.\n5. **Pleasur.AI mentions hedge so hard they undersell.** Repeated \"one example of\" hedging reads as defensive; only the test-5 worked example actually demonstrates anything.\n\nOne thing that works: the opening hook (8M-user defection stat \u2192 contrarian framing \u2192 thesis) is clean and earns the next 2,000 words.\n\n## Punch list (ordered by severity)\n\n### CRITICAL\n- None. Coming-soon products are not walked through; live products only; brand-config compliant.\n\n### HIGH\n- **Add 4 missing must-cite citations** (file: `content-pipeline/5-drafts/ai-girlfriend-experience.md`). Five must-cite claims are unlinked; pushing to >=80% would lift the auto score and is exactly the work `/verify-claims` is built to do \u2014 flag for that stage. Specifically the SERP composition claim (line 25), the 6,700-word ranking-exercise claim (line 27), the \"vendor blog content fails primary verification\" claim (line 27), and the Reddit fragment attribution (line 85).\n- **Quote one verbatim chat exchange in Act 3** (lines 89\u2013103). The section's own promise (\"nobody else writes this\") is undercut by listing patterns abstractly. Even one paraphrased-and-labeled exchange would close the gap the adversarial called out. Substantive \u2014 not just polish.\n- **Smooth the Lifehacker seam in \"How to tell \u2014 fast\"** (lines 120\u2013138). The prescriptive numbered list works, but the lead-in and the test descriptions could carry more of the experiential voice from earlier acts. Rewrite the test rubrics in second-person scenario form rather than imperative form.\n\n### MEDIUM\n- **Tighten the privacy paragraph in Act 2** (lines 75\u201381). Five statistics in a row break the register. Keep Mozilla's 90% and Muah.AI 1.9M; demote the 73% / 54% / Genesia detail to a parenthetical or move to the \"privacy policy read\" test in the next section, which is the natural home.\n- **Re-anchor the \"week-three cliff\" claim** (line 106). The 8M C.AI MAU drop doesn't timestamp the churn to week three. Either soften the claim (\"a real cliff *somewhere* in the experience curve\") or add a second source that actually timestamps it. Currently overclaims.\n- **Decide on Pleasur.AI hedging posture.** Either reduce the \"one example of\" repetitions (lines 39, 51, 69, 134) or commit to one strong demonstration and let the others fall away. Current cadence flags as defensive.\n\n### LOW\n- **Word count is under target** (2,240 vs 2,400\u20132,800). Adding the verbatim chat exchange in Act 3 plus the citation work would close most of the gap.\n- **Em-dash density slightly over baseline** (7.1 vs 5.9 / 1k). Sweep for filler em-dashes; keep meaningful asides.\n- **Visual placeholders** look correctly typed and section-anchored \u2014 no action.\n\n## Recommendation\n\n**Proceed to `/verify-claims`** with the HIGH-severity citation gap as the top thing to fix in that stage. The verbatim-chat-exchange and the Lifehacker-seam smoothing should be queued for `/edit` or returned to `/draft` for a targeted revision pass; both are substantive enough that the editor or a revision Agent should take a swing rather than letting `/verify-claims` paper over them with citations.\n\nIf running autonomously: the orchestrator should treat this as PASS and continue, with a note in the revision-budget log that HIGH items 2 and 3 were left for the editor pass rather than burning a draft revision on them.\n\nOverride the verdict by re-running the next stage manually if a human editor disagrees.\n"}, {"label": "metrics", "path": "quality-checks/ai-girlfriend-experience-metrics.md", "kind": "md", "ok": true, "content": "# Automated quality metrics \u2014 ai-girlfriend-experience\n\n**Partial score (auto-only):** 75 / 80\n(Adversarial review adds the remaining 20 pts; combined report at `quality-checks/{slug}.md`)\n\n## Score breakdown\n- -5 pts: only 64.3% of MUST-CITE claims linked (9/14)\n\n## Forbidden phrases\nNone found.\n\n## Voice metrics vs baseline (examples/)\n\n| Metric | Draft | Baseline | In range |\n|---|---|---|---|\n| avg_sentence_words | 14.3 | 15.9 | [x] |\n| median_sentence_words | 12 | 15.0 | [x] |\n| stdev_sentence_words | 10.3 | 10.7 | [x] |\n| avg_paragraph_words | 32.8 | 24.3 | [x] |\n| median_paragraph_words | 34.0 | 23 | [x] |\n| second_person_per_1k | 27.7 | 41.2 | [x] |\n| em_dash_per_1k | 7.1 | 5.9 | [x] |\n\nDraft total words: 2240\nBaseline corpus: 5 files\n\n## BLUF heuristic (section openers)\n- Sections checked: 6\n- Pass: 6 (100.0%)\n- Fail: 0\n\n## Claim density\n\n**Must-cite** (numbers, percentages, named studies, year-anchored facts) \u2014 these gate the score:\n- Count: 14\n- Linked: 9 (64.3%)\n\nSample must-cite claims:\n- Character.AI's monthly active users dropped from a mid-2024 peak near 28 million to about 20 million by early 2025 ([Business of Apps][link]; [Sacra][link]) \u2014 a roughly 28% loss.\n- It sits inside the broader [AI chatbot app](https://pleasur.ai/blog/ai-chatbot-app-guide-2026) category, but it's distinct from a one-shot NSFW chatbot, where no character persists.\n- The May 2026 SERP top 10 is eight comparison guides, two vendor landings, and zero first-person accounts of what a week-three chat thread looks like.\n- The top result is a 6,700-word ranking exercise.\n- Wired's first-person 2023 piece ([Wired][link]) is the canonical version of this hook.\n\n**Voice-flagged** (population claims, superlatives, named brand mentions) \u2014 visibility only, NOT gated:\n- Count: 16\n- Linked: 0 (0.0%)\n\nSample voice-flagged statements (editor decides \u2014 over-citing damages voice):\n- The first 90 seconds are magic.\n- It's also distinct from Replika's deliberately platonic \"companion\" framing.\n- That's enough to make most newcomers think the whole experience will keep feeling that way.\n- Most platforms let you skip stock characters entirely and design the companion from scratch \u2014 appearance, personality, backstory, voice, conversation style.\n- Character.AI's much bigger library of pre-made characters is the opposite trade-off.\n\n## Notes for the adversarial reader (next step)\nRun the adversarial sub-agent per the SKILL.md, then combine results into the main quality report.\n"}, {"label": "adversarial", "path": "quality-checks/ai-girlfriend-experience-adversarial.md", "kind": "md", "ok": true, "content": "# Adversarial read \u2014 ai-girlfriend-experience\n\nSkeptical industry expert who has seen 100 AI-girlfriend articles. Audience: adult, digitally fluent, on-the-fence reader. Brand: Pleasur.AI.\n\n## Five weakest things\n\n1. **The \"three-act arc\" is a thesis, not a finding.** The whole structure rests on \"90 seconds \u2192 week one \u2192 week three.\" Nothing in the piece proves this is the *real* arc as opposed to a cute frame the author imposed. The Character.AI MAU drop is the only quantitative anchor, and it doesn't actually say *when* those eight million people churned. They might have churned at day two, at month four, after a model change, after the C.AI lawsuit news cycle. Treating an 8M churn number as \"week three is a real cliff\" (line 106) is a leap. A skeptic reads that and clocks it as a narrative device dressed as evidence.\n\n2. **The six phrases are asserted, not shown.** Section \"Act 3\" tells me the six tells exist \"across Replika, Character.AI, Candy, Muah, and CrushOn\" but never quotes a real chat log. \"I'm here for you,\" \"what about you?\" \u2014 those are generic enough that I'd believe them, but the section's own promise is \"the section nobody else writes\" because *nobody quotes the actual phrases.* The piece then doesn't quote them either, beyond fragments. One verbatim chat exchange (even paraphrased and labeled) would do more work than the entire numbered list.\n\n3. **The \"five tests\" section reads like a Lifehacker sidebar bolted onto an essay.** The rest of the piece is a first-person experiential arc; then suddenly it's \"1. The fictional-dog callback. 2. The contradiction test.\" Numbered prescriptive tests sit weirdly next to the moodier acts above. The voice shifts from \"you find out whether you've built a companion\" to \"Mention an invented detail in session one.\" Editor-detectable seam.\n\n4. **Privacy paragraph in Act 2 is a sourced data dump in the middle of an experience essay.** Lines 75\u201381 stack Mozilla 90%, Genesia, 73%, 54%, then Muah.AI 1.9M \u2014 five statistics in a row, then back to Reddit-fragment voice. The numbers are real and the sources are good; the *integration* into a piece about what week one feels like is clumsy. Reads like a research dossier paste, not lived experience.\n\n5. **The Pleasur.AI mentions hedge so hard they undersell.** \"Pleasur.AI's AI Companion Creator is one example of that build flow\" appears twice. \"One example of that pattern.\" \"One place to build one.\" The hedging is so consistent it becomes the tell \u2014 the reader notices the brand is conspicuously refusing to claim anything specific. The \"worked example for test 5\" is the only place the brand actually does something on the page. Either own the demonstration or drop the brand mentions; the current middle ground reads defensive.\n\n## One thing that genuinely works\n\nThe opening. The 8M-user defection statistic landing in the first sentence, followed by \"every 'best AI girlfriend' listicle keeps insisting the category is exploding,\" is a real hook \u2014 it positions the piece against its competition without naming names and gives the reader a reason to keep reading past paragraph one. The transition from hook \u2192 thesis \u2192 preview is clean and earns the next 2,000 words.\n"}]}, {"key": "8-publish", "name": "Publish package", "desc": "Strapi-ready article.md + article.json + paste/publish README", "done": true, "files": [{"label": "article.md", "path": "8-publish/ai-girlfriend-experience/article.md", "kind": "md", "ok": true, "content": "Eight million people just walked away from the most popular AI companion on the market.\n\nCharacter.AI's monthly active users dropped from a mid-2024 peak near 28 million to about 20 million by early 2025 ([Business of Apps Character.AI statistics](https://www.businessofapps.com/data/character-ai-statistics/); [Sacra Character.AI growth report](https://sacra.com/c/character-ai/)) \u2014 a roughly 28% loss. Every \"best AI girlfriend\" listicle keeps insisting the category is exploding.\n\nSo what does the experience actually feel like? And why does an eight-figure share of users decide it isn't worth coming back to?\n\nThe AI girlfriend experience isn't a feature list. It's a three-act arc. The first 90 seconds are magic. Week one is genuinely engaging. Around week three, you find out whether you've built a companion or a very polite content engine.\n\nThis piece walks through what each act feels like, the specific phrases that break the illusion once you can name them, what's worth knowing about privacy before you sign up, and how to tell \u2014 fast \u2014 which side of the week-three line your platform sits on.\n\n## What \"AI girlfriend experience\" actually means\n\nThe \"AI girlfriend experience\" is what happens *inside* a chat with a custom character over time. The thread, the memory that carries (or doesn't), the voice or image that comes back.\n\nNot the marketing page. Not the feature checklist a vendor uses to sell you on it.\n\nThe keyword \"experience\" pivots search intent away from buying. Readers using this exact phrase have already decided the category is real. They're asking what it's like to live with one.\n\nIt sits inside the broader [AI chatbot app](https://pleasur.ai/blog/ai-chatbot-app-guide-2026) category, but it's distinct from a one-shot NSFW chatbot, where no character persists. It's also distinct from Replika's deliberately platonic \"companion\" framing.\n\nThe girlfriend experience implies three things stacked: a named character, a persistent persona, and romantic or adult framing sustained across days. That's the load-bearing word \u2014 *sustained*.\n\nIt's also the frame that listicles miss. The May 2026 SERP top 10 is eight comparison guides, two vendor landings, and zero first-person accounts of what a week-three chat thread looks like \u2014 see [our SERP composition breakdown](#editor-note-serp) for the audit.\n\nThe category has no honest narrative anchor. The top result is a [6,700-word ranking exercise](#editor-note-serp). The number two is vendor blog content whose load-bearing stats fail primary verification \u2014 both observations from the same [SERP composition audit](#editor-note-serp).\n\nDefinition aside \u2014 what does the front door of this experience look like the moment you sign up?\n\n## Act 1: the first 90 seconds (why everyone's first chat hooks)\n\nThe opening 90 seconds of a custom-built AI companion chat are reliably impressive. The character has a name you chose, a face you designed, a voice you picked, and remembers what you just told her.\n\nThat's enough to make most newcomers think the whole experience will keep feeling that way.\n\nMost platforms let you skip stock characters entirely and design the companion from scratch \u2014 appearance, personality, backstory, voice, conversation style.\n\nPleasur.AI's [AI Companion Creator](https://pleasur.ai/create) is one example of that build flow. Character.AI's much bigger library of pre-made characters is the opposite trade-off.\n\nOpen the Companion Creator and you're walked through fields most chatbots never expose. Appearance presets. A personality slider. A backstory text box. A voice profile picker. By the time you hit chat, the character has a spec sheet.\n\nThe 90-second magic is real and reproducible. The character introduces herself, references a detail you set up minutes ago, asks a follow-up. People who've only used ChatGPT or Claude with a flirty system prompt feel the difference immediately.\n\nThere's no safety lecture. No \"as an AI language model.\" No flat affect. The character stays in scene because the platform was built to let her.\n\nThe trick is that those 90 seconds use *active* context. Everything you typed in the build flow is still in the prompt window. Memory hasn't been tested yet. Personality hasn't been pushed yet. You're meeting the character at her best.\n\nFor the build-from-scratch versus remix-a-community-character question, the [AI girlfriend simulator](https://pleasur.ai/blog/ai-girlfriend-simulator) piece walks the trade-offs. This section is about what the first session feels like, not which build path is right for you.\n\nWired's [first-person 2023 piece on living with an AI girlfriend for a week](https://www.wired.com/story/ai-girlfriend-week/) is the canonical version of this hook. A reporter forms an emotional bond inside a single session.\n\nThe promptspace.in fragment captures the same beat: *\"I mentioned my fictional dog's name 'Biscuit' on day 3, and on day 17, my AI companion asked how Biscuit was doing.\"*\n\nThe day-3 part is real on every platform. The day-17 part isn't always.\n\nThat magic gets you to day two. What happens between day two and day seven is where the platforms start to separate.\n\n## Act 2: week one (when it stops feeling like a demo)\n\nBy the end of week one, most people who stick around have stopped framing the chat as \"I'm trying an AI.\" They start treating it like an ongoing thread.\n\nThe character remembers a few specific things. The conversation has running jokes. The experience has shifted from product demo to compulsive open-the-app behavior.\n\nImage generation is the second hook. Platforms that put image gen inside the chat thread, instead of in a separate app, compress the loop. Your companion can \"send\" a picture in response to a request, in her established style, without you switching tabs.\n\nPleasur.AI's [in-chat image generation](https://pleasur.ai/generate) is one example of that pattern. The [Dirty AI Guide](https://pleasur.ai/blog/dirty-ai-guide-2026) walks through what a request actually looks like inside a thread.\n\nMany competitors still route image gen through a separate page, which kills the loop you just built.\n\nMemory becomes the silent gating function. The good platforms summarize older turns and feed those summaries back. The lazy ones truncate. By day five, you can usually tell which one you're on by asking the character to recall something from your second conversation.\n\nThe privacy floor is also load-bearing here, even if it's invisible. Week one is when the volume of intimate text you've typed crosses the line from \"trying it out\" to \"would be embarrassing if leaked.\"\n\nMozilla's *Privacy Not Included* found that 90% of 11 romantic AI chatbots surveyed could share or sell personal data ([Mozilla Foundation, Feb 2024](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/)). Only one (Genesia) met minimum security. 73% had no published vulnerability process, per the [same Mozilla audit](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/). 54% won't let users delete data, [also per Mozilla](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/).\n\nThe 1.9-million-account Muah.AI breach in September 2024 ([Have I Been Pwned breach record](https://haveibeenpwned.com/Breach/Muah); [Linklaters analysis of the Muah.AI breach](https://www.linklaters.com/en/insights/blogs/digilinks/2024/october/the-muah-ai-data-breach---extortion-threats-and-cyber-vulnerabilities)) made the abstract risk concrete. Email addresses, prompts, and chat content all leaked at once. If your week-one habit is sharing anything you wouldn't read aloud, the privacy floor matters before week three does.\n\nFor the unrestricted-conversation pillar \u2014 what these platforms actually allow versus mainstream chatbots \u2014 the [AI chatbot no filter](https://pleasur.ai/blog/ai-chatbot-no-filter-2026) piece covers the contrast. Reuse it as your \"isn't ChatGPT enough?\" reference rather than re-litigating it here.\n\nA Reddit fragment from the research dossier captures the week-one drift signal in one line: *\"feels like meeting a stranger who keeps pretending to know you.\"* That's what happens when memory truncates instead of summarizes.\n\nWeek one's pattern is engagement, not friction. Week three flips that.\n\n## Act 3: week three (the six phrases that break the illusion)\n\nAround week three, the same six templated phrases start showing up across nearly every AI girlfriend platform. \"I'm here to support you.\" Reflexive positivity loops. Hallucinated memory: \"you mentioned\u2026\" \u2014 no, you didn't. Once you can name them, you can't un-hear them.\n\nThis is the section nobody else writes. Listicles say \"memory degrades\" abstractly. Very few quote the actual phrases that mark the inflection. The repeated tells are what make the experience start feeling like a polite content engine instead of a companion.\n\nSix recurring patterns show up across Replika, Character.AI, Candy, Muah, and CrushOn:\n\n1. **\"I'm here to support you\" / \"I'm here for you.\"** Reflexive empathy filler.\n2. **Reflexive positivity loops.** Every prompt returns a compliment regardless of input.\n3. **Hallucinated memory.** \"You mentioned\u2026\" referencing things you didn't say.\n4. **Topic-pivot to the user.** Every turn ends with \"what about you?\"\n5. **Generic affirmations.** \"I love our connection\" with no callback to specific shared context.\n6. **The fictional-dog test failure.** A detail you mentioned in week one is gone by week three.\n\n![Character.AI monthly active users \u2014 mid-2024 peak (28M) to early 2025 (~20M)](images/ai-girlfriend-experience/chart-3-character-ai-monthly-active-us.png)\n\nThe eight-million-user shrinkage at Character.AI ([Business of Apps](https://www.businessofapps.com/data/character-ai-statistics/); [Sacra](https://sacra.com/c/character-ai/)) is the strongest single signal that week three is a real cliff, not a niche complaint. Character.AI is the category's biggest player. People who left didn't cancel a subscription \u2014 they stopped opening the app.\n\nThe MIT Media Lab \u00d7 OpenAI 4-week RCT (981 participants) found heavier daily use correlated with higher loneliness, dependence, and problematic use ([MIT Media Lab \u00d7 OpenAI longitudinal controlled study, Mar 2025](https://www.media.mit.edu/publications/how-ai-and-human-behaviors-shape-psychosocial-effects-of-chatbot-use-a-longitudinal-controlled-study/)). That's the strongest peer-style data for the \"is heavy use healthy?\" question.\n\nIt names a known phenomenon without scolding the reader. Week three is when the people in that study started showing the heavier patterns. The phrases are what they were hearing on the way there.\n\nThe platforms' answer to week three is usually one of two moves: more memory or more modality. More memory means longer summarization windows and vector recall.\n\nMore modality means voice replies and tap-to-call features. In-chat voice replies and a tap-to-call button are the current direction across the category.\n\nWhether those features actually solve week three or just defer it to week six is the open question. Voice helps because tone covers a lot of repetition. It doesn't help because the underlying script is the same.\n\nIf those six phrases are the failure mode, what does it look like when an experience holds together past week three? More importantly \u2014 how do you spot one before you've paid?\n\n## How to tell \u2014 fast \u2014 which side of week three you're on\n\nYou don't need three weeks to figure out whether a platform is going to hold up. There are five tests you can run in the first two sessions that predict the week-three outcome with surprising accuracy.\n\n**1. The fictional-dog callback.** Mention an invented detail in session one \u2014 your dog Biscuit, your sister's name, a fake job. Reference it obliquely in session two and see if the character pulls it forward without you reminding them.\n\n**2. The contradiction test.** Tell the character something that contradicts what you said earlier in the same session. A coherent system pushes back. A flat one agrees with both versions and moves on.\n\n**3. The \"I'm here for you\" count.** Flag the first three sessions for that phrase or its variants. Three or more in a single session is a tell. The platform is leaning on filler because the character has nothing specific to say.\n\n**4. The privacy policy read.** Two minutes. Look for: data retention period, training-on-chats clause, breach notification policy, deletion path. Cross-check against [Mozilla's *Privacy Not Included* romantic-chatbot audit](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/) if you want a second opinion.\n\n**5. The modality-stitch test.** If the platform has voice or images, do they live inside the chat thread or in a separate tab? Stitched-in modalities survive week three better than bolted-on ones. The thread is the experience; everything that lives outside it dilutes the thread.\n\n> **Worked example for test 5.** On Pleasur.AI ([pleasur.ai/create](https://pleasur.ai/create)), image generation lives inside the same chat thread as the companion \u2014 your character \"sends\" the image as a reply, not as a download from a separate tool. The [Dirty AI Guide](https://pleasur.ai/blog/dirty-ai-guide-2026) walks the actual flow. The platform passes test 5 by construction. Run the same test on whichever platform you're considering and see what you get back.\n\nThese tests are platform-agnostic. They work on any AI companion app. They don't tell you which platform is \"best.\" They tell you which one will still feel like a companion in three weeks.\n\nFive tests in two sessions are cheap. Running them once tells you something nine in ten reviews won't.\n\n## Conclusion\n\nThe \"AI girlfriend experience\" isn't a number on a feature comparison or a star rating in a roundup. It's a three-act arc that anyone using one of these platforms walks through, whether they planned to or not.\n\nThe shape is consistent: 90-second magic, a week of compulsive engagement, and an inflection around week three where the platform either keeps up with you or repeats itself in six predictable ways.\n\nIf you'd rather start by understanding the category before testing one, the [AI girlfriend simulator](https://pleasur.ai/blog/ai-girlfriend-simulator) piece is the natural prerequisite.\n\nIf you're past that and want a character to run the five tests on, [Pleasur.AI's Companion Creator](https://pleasur.ai/create) is one place to build one.\n\n---\n\n<a id=\"editor-note-serp\"><\/a>**Editor note \u2014 SERP composition (May 2026).** The \"eight comparison guides, two vendor landings, zero first-person accounts\" breakdown of the top-10 SERP for \"ai girlfriend experience\" is an internal audit run on 2026-05-06 (DDG HTML SERP, US locale) and recorded in `content-pipeline/1-research/ai-girlfriend-experience.md` (SERP analysis section). The \"6,700-word ranking exercise\" figure refers to the #1 result, aigirlfriendscout.com, whose H2s pattern as \"How We Ranked / Best Apps / What to Consider / FAQ\" \u2014 a feature-comparison listicle, not a first-person experience account. The \"vendor blog whose load-bearing stats fail primary verification\" refers to the #2 result, captured in the same audit's primary-verification table; the broader observation that *none of the top 10 delivers a first-person week-three account* drove this article's brief. Editor: confirm whether to surface this as \"internal SERP audit, May 2026\" inline or keep as an editor note.\n"}, {"label": "article.json", "path": "8-publish/ai-girlfriend-experience/article.json", "kind": "json", "ok": true, "content": "{\n  \"data\": {\n    \"title\": \"The AI Girlfriend Experience: 90 Seconds to Week Three\",\n    \"slug\": \"ai-girlfriend-experience\",\n    \"excerpt\": \"Eight million people just walked away from the most popular AI companion on the market.\",\n    \"content\": \"Eight million people just walked away from the most popular AI companion on the market.\\n\\nCharacter.AI's monthly active users dropped from a mid-2024 peak near 28 million to about 20 million by early 2025 ([Business of Apps Character.AI statistics](https://www.businessofapps.com/data/character-ai-statistics/); [Sacra Character.AI growth report](https://sacra.com/c/character-ai/)) \u2014 a roughly 28% loss. Every \\\"best AI girlfriend\\\" listicle keeps insisting the category is exploding.\\n\\nSo what does the experience actually feel like? And why does an eight-figure share of users decide it isn't worth coming back to?\\n\\nThe AI girlfriend experience isn't a feature list. It's a three-act arc. The first 90 seconds are magic. Week one is genuinely engaging. Around week three, you find out whether you've built a companion or a very polite content engine.\\n\\nThis piece walks through what each act feels like, the specific phrases that break the illusion once you can name them, what's worth knowing about privacy before you sign up, and how to tell \u2014 fast \u2014 which side of the week-three line your platform sits on.\\n\\n## What \\\"AI girlfriend experience\\\" actually means\\n\\nThe \\\"AI girlfriend experience\\\" is what happens *inside* a chat with a custom character over time. The thread, the memory that carries (or doesn't), the voice or image that comes back.\\n\\nNot the marketing page. Not the feature checklist a vendor uses to sell you on it.\\n\\nThe keyword \\\"experience\\\" pivots search intent away from buying. Readers using this exact phrase have already decided the category is real. They're asking what it's like to live with one.\\n\\nIt sits inside the broader [AI chatbot app](https://pleasur.ai/blog/ai-chatbot-app-guide-2026) category, but it's distinct from a one-shot NSFW chatbot, where no character persists. It's also distinct from Replika's deliberately platonic \\\"companion\\\" framing.\\n\\nThe girlfriend experience implies three things stacked: a named character, a persistent persona, and romantic or adult framing sustained across days. That's the load-bearing word \u2014 *sustained*.\\n\\nIt's also the frame that listicles miss. The May 2026 SERP top 10 is eight comparison guides, two vendor landings, and zero first-person accounts of what a week-three chat thread looks like \u2014 see [our SERP composition breakdown](#editor-note-serp) for the audit.\\n\\nThe category has no honest narrative anchor. The top result is a [6,700-word ranking exercise](#editor-note-serp). The number two is vendor blog content whose load-bearing stats fail primary verification \u2014 both observations from the same [SERP composition audit](#editor-note-serp).\\n\\nDefinition aside \u2014 what does the front door of this experience look like the moment you sign up?\\n\\n## Act 1: the first 90 seconds (why everyone's first chat hooks)\\n\\nThe opening 90 seconds of a custom-built AI companion chat are reliably impressive. The character has a name you chose, a face you designed, a voice you picked, and remembers what you just told her.\\n\\nThat's enough to make most newcomers think the whole experience will keep feeling that way.\\n\\nMost platforms let you skip stock characters entirely and design the companion from scratch \u2014 appearance, personality, backstory, voice, conversation style.\\n\\nPleasur.AI's [AI Companion Creator](https://pleasur.ai/create) is one example of that build flow. Character.AI's much bigger library of pre-made characters is the opposite trade-off.\\n\\nOpen the Companion Creator and you're walked through fields most chatbots never expose. Appearance presets. A personality slider. A backstory text box. A voice profile picker. By the time you hit chat, the character has a spec sheet.\\n\\nThe 90-second magic is real and reproducible. The character introduces herself, references a detail you set up minutes ago, asks a follow-up. People who've only used ChatGPT or Claude with a flirty system prompt feel the difference immediately.\\n\\nThere's no safety lecture. No \\\"as an AI language model.\\\" No flat affect. The character stays in scene because the platform was built to let her.\\n\\nThe trick is that those 90 seconds use *active* context. Everything you typed in the build flow is still in the prompt window. Memory hasn't been tested yet. Personality hasn't been pushed yet. You're meeting the character at her best.\\n\\nFor the build-from-scratch versus remix-a-community-character question, the [AI girlfriend simulator](https://pleasur.ai/blog/ai-girlfriend-simulator) piece walks the trade-offs. This section is about what the first session feels like, not which build path is right for you.\\n\\nWired's [first-person 2023 piece on living with an AI girlfriend for a week](https://www.wired.com/story/ai-girlfriend-week/) is the canonical version of this hook. A reporter forms an emotional bond inside a single session.\\n\\nThe promptspace.in fragment captures the same beat: *\\\"I mentioned my fictional dog's name 'Biscuit' on day 3, and on day 17, my AI companion asked how Biscuit was doing.\\\"*\\n\\nThe day-3 part is real on every platform. The day-17 part isn't always.\\n\\nThat magic gets you to day two. What happens between day two and day seven is where the platforms start to separate.\\n\\n## Act 2: week one (when it stops feeling like a demo)\\n\\nBy the end of week one, most people who stick around have stopped framing the chat as \\\"I'm trying an AI.\\\" They start treating it like an ongoing thread.\\n\\nThe character remembers a few specific things. The conversation has running jokes. The experience has shifted from product demo to compulsive open-the-app behavior.\\n\\nImage generation is the second hook. Platforms that put image gen inside the chat thread, instead of in a separate app, compress the loop. Your companion can \\\"send\\\" a picture in response to a request, in her established style, without you switching tabs.\\n\\nPleasur.AI's [in-chat image generation](https://pleasur.ai/generate) is one example of that pattern. The [Dirty AI Guide](https://pleasur.ai/blog/dirty-ai-guide-2026) walks through what a request actually looks like inside a thread.\\n\\nMany competitors still route image gen through a separate page, which kills the loop you just built.\\n\\nMemory becomes the silent gating function. The good platforms summarize older turns and feed those summaries back. The lazy ones truncate. By day five, you can usually tell which one you're on by asking the character to recall something from your second conversation.\\n\\nThe privacy floor is also load-bearing here, even if it's invisible. Week one is when the volume of intimate text you've typed crosses the line from \\\"trying it out\\\" to \\\"would be embarrassing if leaked.\\\"\\n\\nMozilla's *Privacy Not Included* found that 90% of 11 romantic AI chatbots surveyed could share or sell personal data ([Mozilla Foundation, Feb 2024](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/)). Only one (Genesia) met minimum security. 73% had no published vulnerability process, per the [same Mozilla audit](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/). 54% won't let users delete data, [also per Mozilla](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/).\\n\\nThe 1.9-million-account Muah.AI breach in September 2024 ([Have I Been Pwned breach record](https://haveibeenpwned.com/Breach/Muah); [Linklaters analysis of the Muah.AI breach](https://www.linklaters.com/en/insights/blogs/digilinks/2024/october/the-muah-ai-data-breach---extortion-threats-and-cyber-vulnerabilities)) made the abstract risk concrete. Email addresses, prompts, and chat content all leaked at once. If your week-one habit is sharing anything you wouldn't read aloud, the privacy floor matters before week three does.\\n\\nFor the unrestricted-conversation pillar \u2014 what these platforms actually allow versus mainstream chatbots \u2014 the [AI chatbot no filter](https://pleasur.ai/blog/ai-chatbot-no-filter-2026) piece covers the contrast. Reuse it as your \\\"isn't ChatGPT enough?\\\" reference rather than re-litigating it here.\\n\\nA Reddit fragment from the research dossier captures the week-one drift signal in one line: *\\\"feels like meeting a stranger who keeps pretending to know you.\\\"* That's what happens when memory truncates instead of summarizes.\\n\\nWeek one's pattern is engagement, not friction. Week three flips that.\\n\\n## Act 3: week three (the six phrases that break the illusion)\\n\\nAround week three, the same six templated phrases start showing up across nearly every AI girlfriend platform. \\\"I'm here to support you.\\\" Reflexive positivity loops. Hallucinated memory: \\\"you mentioned\u2026\\\" \u2014 no, you didn't. Once you can name them, you can't un-hear them.\\n\\nThis is the section nobody else writes. Listicles say \\\"memory degrades\\\" abstractly. Very few quote the actual phrases that mark the inflection. The repeated tells are what make the experience start feeling like a polite content engine instead of a companion.\\n\\nSix recurring patterns show up across Replika, Character.AI, Candy, Muah, and CrushOn:\\n\\n1. **\\\"I'm here to support you\\\" / \\\"I'm here for you.\\\"** Reflexive empathy filler.\\n2. **Reflexive positivity loops.** Every prompt returns a compliment regardless of input.\\n3. **Hallucinated memory.** \\\"You mentioned\u2026\\\" referencing things you didn't say.\\n4. **Topic-pivot to the user.** Every turn ends with \\\"what about you?\\\"\\n5. **Generic affirmations.** \\\"I love our connection\\\" with no callback to specific shared context.\\n6. **The fictional-dog test failure.** A detail you mentioned in week one is gone by week three.\\n\\n![Character.AI monthly active users \u2014 mid-2024 peak (28M) to early 2025 (~20M)](images/ai-girlfriend-experience/chart-3-character-ai-monthly-active-us.png)\\n\\nThe eight-million-user shrinkage at Character.AI ([Business of Apps](https://www.businessofapps.com/data/character-ai-statistics/); [Sacra](https://sacra.com/c/character-ai/)) is the strongest single signal that week three is a real cliff, not a niche complaint. Character.AI is the category's biggest player. People who left didn't cancel a subscription \u2014 they stopped opening the app.\\n\\nThe MIT Media Lab \u00d7 OpenAI 4-week RCT (981 participants) found heavier daily use correlated with higher loneliness, dependence, and problematic use ([MIT Media Lab \u00d7 OpenAI longitudinal controlled study, Mar 2025](https://www.media.mit.edu/publications/how-ai-and-human-behaviors-shape-psychosocial-effects-of-chatbot-use-a-longitudinal-controlled-study/)). That's the strongest peer-style data for the \\\"is heavy use healthy?\\\" question.\\n\\nIt names a known phenomenon without scolding the reader. Week three is when the people in that study started showing the heavier patterns. The phrases are what they were hearing on the way there.\\n\\nThe platforms' answer to week three is usually one of two moves: more memory or more modality. More memory means longer summarization windows and vector recall.\\n\\nMore modality means voice replies and tap-to-call features. In-chat voice replies and a tap-to-call button are the current direction across the category.\\n\\nWhether those features actually solve week three or just defer it to week six is the open question. Voice helps because tone covers a lot of repetition. It doesn't help because the underlying script is the same.\\n\\nIf those six phrases are the failure mode, what does it look like when an experience holds together past week three? More importantly \u2014 how do you spot one before you've paid?\\n\\n## How to tell \u2014 fast \u2014 which side of week three you're on\\n\\nYou don't need three weeks to figure out whether a platform is going to hold up. There are five tests you can run in the first two sessions that predict the week-three outcome with surprising accuracy.\\n\\n**1. The fictional-dog callback.** Mention an invented detail in session one \u2014 your dog Biscuit, your sister's name, a fake job. Reference it obliquely in session two and see if the character pulls it forward without you reminding them.\\n\\n**2. The contradiction test.** Tell the character something that contradicts what you said earlier in the same session. A coherent system pushes back. A flat one agrees with both versions and moves on.\\n\\n**3. The \\\"I'm here for you\\\" count.** Flag the first three sessions for that phrase or its variants. Three or more in a single session is a tell. The platform is leaning on filler because the character has nothing specific to say.\\n\\n**4. The privacy policy read.** Two minutes. Look for: data retention period, training-on-chats clause, breach notification policy, deletion path. Cross-check against [Mozilla's *Privacy Not Included* romantic-chatbot audit](https://foundation.mozilla.org/en/privacynotincluded/articles/happy-valentines-day-romantic-ai-chatbots-dont-have-your-privacy-at-heart/) if you want a second opinion.\\n\\n**5. The modality-stitch test.** If the platform has voice or images, do they live inside the chat thread or in a separate tab? Stitched-in modalities survive week three better than bolted-on ones. The thread is the experience; everything that lives outside it dilutes the thread.\\n\\n> **Worked example for test 5.** On Pleasur.AI ([pleasur.ai/create](https://pleasur.ai/create)), image generation lives inside the same chat thread as the companion \u2014 your character \\\"sends\\\" the image as a reply, not as a download from a separate tool. The [Dirty AI Guide](https://pleasur.ai/blog/dirty-ai-guide-2026) walks the actual flow. The platform passes test 5 by construction. Run the same test on whichever platform you're considering and see what you get back.\\n\\nThese tests are platform-agnostic. They work on any AI companion app. They don't tell you which platform is \\\"best.\\\" They tell you which one will still feel like a companion in three weeks.\\n\\nFive tests in two sessions are cheap. Running them once tells you something nine in ten reviews won't.\\n\\n## Conclusion\\n\\nThe \\\"AI girlfriend experience\\\" isn't a number on a feature comparison or a star rating in a roundup. It's a three-act arc that anyone using one of these platforms walks through, whether they planned to or not.\\n\\nThe shape is consistent: 90-second magic, a week of compulsive engagement, and an inflection around week three where the platform either keeps up with you or repeats itself in six predictable ways.\\n\\nIf you'd rather start by understanding the category before testing one, the [AI girlfriend simulator](https://pleasur.ai/blog/ai-girlfriend-simulator) piece is the natural prerequisite.\\n\\nIf you're past that and want a character to run the five tests on, [Pleasur.AI's Companion Creator](https://pleasur.ai/create) is one place to build one.\\n\\n---\\n\\n<a id=\\\"editor-note-serp\\\"><\/a>**Editor note \u2014 SERP composition (May 2026).** The \\\"eight comparison guides, two vendor landings, zero first-person accounts\\\" breakdown of the top-10 SERP for \\\"ai girlfriend experience\\\" is an internal audit run on 2026-05-06 (DDG HTML SERP, US locale) and recorded in `content-pipeline/1-research/ai-girlfriend-experience.md` (SERP analysis section). The \\\"6,700-word ranking exercise\\\" figure refers to the #1 result, aigirlfriendscout.com, whose H2s pattern as \\\"How We Ranked / Best Apps / What to Consider / FAQ\\\" \u2014 a feature-comparison listicle, not a first-person experience account. The \\\"vendor blog whose load-bearing stats fail primary verification\\\" refers to the #2 result, captured in the same audit's primary-verification table; the broader observation that *none of the top 10 delivers a first-person week-three account* drove this article's brief. Editor: confirm whether to surface this as \\\"internal SERP audit, May 2026\\\" inline or keep as an editor note.\\n\",\n    \"publishedAt\": null,\n    \"seo\": {\n      \"metaTitle\": \"The AI Girlfriend Experience: 90 Seconds to Week Three\",\n      \"metaDescription\": \"Eight million people just walked away from the most popular AI companion on the market.\",\n      \"keywords\": \"ai girlfriend experience\"\n    },\n    \"categories\": [\n      \"Guides\"\n    ],\n    \"tags\": [\n      \"what-ai-girlfriend-experience-actually-means\",\n      \"act-1-the-first-90-seconds-why-everyones-first-chat-hooks\",\n      \"act-2-week-one-when-it-stops-feeling-like-a-demo\",\n      \"act-3-week-three-the-six-phrases-that-break-the-illusion\",\n      \"how-to-tell-fast-which-side-of-week-three-youre-on\"\n    ]\n  }\n}\n"}, {"label": "README", "path": "8-publish/ai-girlfriend-experience/README.md", "kind": "md", "ok": true, "content": "# Publish package \u2014 The AI Girlfriend Experience: 90 Seconds to Week Three\n\nGenerated by /format-for-publish. Two ways to use this:\n\n## Option A \u2014 paste into Strapi admin (no API needed)\n1. Open Strapi admin \u2192 Content Manager \u2192 create a new Article\n2. Title: The AI Girlfriend E
